services:
  bridge:
    build:
      context: .
      target: bridge
    ports:
      - "3080:3080"
    env_file:
      - path: .env
        required: false
    environment:
      - BACKEND_URL=http://backend:8080
    volumes:
      - ./bridge-baileys/auth_baileys:/app/auth_baileys
    restart: unless-stopped

  backend:
    build:
      context: .
      target: backend
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      - BRIDGE_URL=http://bridge:3080
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - bridge
    restart: unless-stopped
