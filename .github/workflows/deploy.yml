# Деплой на сервер при пуше в main: git pull + docker compose up
name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${DEPLOY_HOST:-159.223.0.234}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via Docker Compose
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_REMOTE_DIR: ${{ secrets.DEPLOY_REMOTE_DIR }}
        run: |
          SERVER="root@${DEPLOY_HOST:-159.223.0.234}"
          REMOTE_DIR="${DEPLOY_REMOTE_DIR:-/opt/playground}"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${SERVER}" \
            "cd ${REMOTE_DIR} && git pull && docker compose up -d --build"
          echo "→ Деплой завершён."
