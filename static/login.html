<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Вход — WhatsApp Teachers</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0f0f12; color: #e4e4e7; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: #1a1a1f; border: 1px solid #2d2d35; border-radius: 12px; padding: 2rem; width: 100%; max-width: 360px; }
    h1 { font-size: 1.25rem; margin: 0 0 1.5rem; }
    label { display: block; margin-bottom: 0.35rem; font-size: 0.875rem; color: #71717a; }
    input { width: 100%; padding: 0.6rem; border-radius: 8px; border: 1px solid #2d2d35; background: #0f0f12; color: #e4e4e7; font-size: 1rem; margin-bottom: 1rem; }
    button { width: 100%; padding: 0.65rem; border: none; border-radius: 8px; background: #22c55e; color: #000; font-weight: 600; cursor: pointer; font-size: 1rem; }
    button:hover { background: #16a34a; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { color: #f87171; font-size: 0.875rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Вход</h1>
    <form id="form">
      <label for="username">Логин</label>
      <input type="text" id="username" name="username" required autocomplete="username" />
      <label for="password">Пароль</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" />
      <button type="submit" id="btn">Войти</button>
    </form>
    <p class="error" id="err" style="display:none"></p>
  </div>
  <script>
    const API = "";
    document.getElementById("form").onsubmit = async function(e) {
      e.preventDefault();
      const btn = document.getElementById("btn");
      const err = document.getElementById("err");
      err.style.display = "none";
      btn.disabled = true;
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      if (!username || !password) {
        err.textContent = "Введите логин и пароль";
        err.style.display = "block";
        btn.disabled = false;
        return;
      }
      try {
        const form = new URLSearchParams();
        form.set("username", username);
        form.set("password", password);
        const r = await fetch(API + "/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: form.toString(),
          credentials: "include"
        });
        if (r.ok) {
          window.location.href = "/app/";
          return;
        }
        const text = await r.text();
        let msg = "Ошибка входа";
        try {
          const data = text ? JSON.parse(text) : {};
          if (data.detail !== undefined) {
            if (typeof data.detail === "string") msg = data.detail;
            else if (Array.isArray(data.detail) && data.detail[0]?.msg) msg = data.detail[0].msg;
            else if (typeof data.detail === "object" && data.detail !== null) msg = data.detail.msg || JSON.stringify(data.detail);
          } else if (typeof data.message === "string") msg = data.message;
        } catch (_) {
          if (text && text.length < 200) msg = text;
        }
        err.textContent = String(msg);
        err.style.display = "block";
      } catch (e) {
        err.textContent = (e && typeof e.message === "string") ? e.message : "Ошибка сети";
        err.style.display = "block";
      }
      btn.disabled = false;
    };
  </script>
</body>
</html>
