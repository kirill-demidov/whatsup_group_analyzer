<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Вход — WhatsApp Teachers</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0f0f12; color: #e4e4e7; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: #1a1a1f; border: 1px solid #2d2d35; border-radius: 12px; padding: 2rem; width: 100%; max-width: 360px; }
    h1 { font-size: 1.25rem; margin: 0 0 1.5rem; }
    label { display: block; margin-bottom: 0.35rem; font-size: 0.875rem; color: #71717a; }
    input { width: 100%; padding: 0.6rem; border-radius: 8px; border: 1px solid #2d2d35; background: #0f0f12; color: #e4e4e7; font-size: 1rem; margin-bottom: 1rem; }
    button { width: 100%; padding: 0.65rem; border: none; border-radius: 8px; background: #22c55e; color: #000; font-weight: 600; cursor: pointer; font-size: 1rem; }
    button:hover { background: #16a34a; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { color: #f87171; font-size: 0.875rem; margin-top: 0.5rem; }
    .divider { display: flex; align-items: center; margin: 1.25rem 0; color: #71717a; font-size: 0.85rem; }
    .divider::before, .divider::after { content: ""; flex: 1; border-bottom: 1px solid #2d2d35; }
    .divider::before { margin-right: 0.75rem; }
    .divider::after { margin-left: 0.75rem; }
    .btn-google { background: #fff; color: #333; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .btn-google:hover { background: #f0f0f0; }
    .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Вход</h1>
    <form id="form">
      <label for="username">Логин</label>
      <input type="text" id="username" name="username" required autocomplete="username" />
      <label for="password">Пароль</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" />
      <button type="submit" id="btn">Войти</button>
    </form>
    <p class="error" id="err" style="display:none"></p>
    <div class="divider" id="google-divider" style="display:none">или</div>
    <a href="/api/auth/google" class="btn-google" id="google-btn" style="display:none; text-decoration:none; padding:0.65rem; border-radius:8px; font-weight:600; font-size:1rem;">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.08 24.08 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Войти через Google
    </a>
  </div>
  <script>
    const API = "";
    // Show Google button if OAuth is configured
    fetch(API + "/api/auth/providers").then(r => r.json()).then(data => {
      if (data.google) {
        document.getElementById("google-divider").style.display = "flex";
        document.getElementById("google-btn").style.display = "flex";
      }
    }).catch(() => {});
    // Show error from Google OAuth redirect
    const params = new URLSearchParams(window.location.search);
    if (params.get("error")) {
      const err = document.getElementById("err");
      const msgs = { google_denied: "Google авторизация отклонена", google_failed: "Ошибка Google авторизации" };
      err.textContent = msgs[params.get("error")] || "Ошибка авторизации";
      err.style.display = "block";
    }
    document.getElementById("form").onsubmit = async function(e) {
      e.preventDefault();
      const btn = document.getElementById("btn");
      const err = document.getElementById("err");
      err.style.display = "none";
      btn.disabled = true;
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      if (!username || !password) {
        err.textContent = "Введите логин и пароль";
        err.style.display = "block";
        btn.disabled = false;
        return;
      }
      try {
        const form = new URLSearchParams();
        form.set("username", username);
        form.set("password", password);
        const r = await fetch(API + "/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: form.toString(),
          credentials: "include"
        });
        if (r.ok) {
          window.location.href = "/app/";
          return;
        }
        const text = await r.text();
        let msg = "Ошибка входа";
        try {
          const data = text ? JSON.parse(text) : {};
          if (data.detail !== undefined) {
            if (typeof data.detail === "string") msg = data.detail;
            else if (Array.isArray(data.detail) && data.detail[0]?.msg) msg = data.detail[0].msg;
            else if (typeof data.detail === "object" && data.detail !== null) msg = data.detail.msg || JSON.stringify(data.detail);
          } else if (typeof data.message === "string") msg = data.message;
        } catch (_) {
          if (text && text.length < 200) msg = text;
        }
        err.textContent = String(msg);
        err.style.display = "block";
      } catch (e) {
        err.textContent = (e && typeof e.message === "string") ? e.message : "Ошибка сети";
        err.style.display = "block";
      }
      btn.disabled = false;
    };
  </script>
</body>
</html>
